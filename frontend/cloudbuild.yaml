steps:
  # 1. Build the Next.js container image with the build-arg API URL
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fanly-frontend:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://fanly-backend-eejh7tjlua-uc.a.run.app'
      - '.'
    dir: 'frontend'

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fanly-frontend:$COMMIT_SHA'

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fanly-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fanly-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--project'
      - '$PROJECT_ID'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
